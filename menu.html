<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestro Menú</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --terracotta: #C1603A;
    --clay:       #D98B5F;
    --cream:      #FDF6ED;
    --parchment:  #F2E8D9;
    --bark:       #5C3D2E;
    --bark-light: #8A6050;
    --sage:       #7A8C6E;
    --white:      #FFFFFF;
    --shadow:     rgba(92,61,46,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--bark);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--bark);
    padding: 20px 20px 0;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding-bottom: 14px;
  }
  .logo-flame { font-size: 26px; }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.02em;
  }
  header h1 span { color: var(--clay); font-style: italic; }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 0 4px 12px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1.5px solid var(--bark-light);
    color: var(--parchment);
    border-radius: 20px;
    padding: 5px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--terracotta);
    border-color: var(--terracotta);
    color: var(--white);
  }

  /* ── MAIN ── */
  main {
    padding: 20px 16px 100px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── SURPRISE BAR ── */
  .surprise-bar {
    background: linear-gradient(135deg, var(--terracotta), var(--clay));
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
    box-shadow: 0 4px 14px rgba(193,96,58,0.25);
  }
  .surprise-bar p { color: var(--white); font-size: 0.85rem; font-weight: 600; line-height: 1.3; }
  .surprise-bar p em { font-style: normal; font-size: 1rem; font-family: 'Playfair Display', serif; }
  .btn-surprise {
    background: var(--white);
    color: var(--terracotta);
    border: none;
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.15s;
  }
  .btn-surprise:active { transform: scale(0.96); }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--bark-light);
    margin-bottom: 12px;
  }

  /* ── CARDS ── */
  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .card {
    background: var(--white);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 10px var(--shadow);
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px var(--shadow); }
  .card:active { transform: scale(0.98); }
  .card-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--parchment);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.4rem;
  }
  .card-body { padding: 10px 12px 12px; }
  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--bark);
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .card-time { font-size: 0.72rem; color: var(--bark-light); }
  .card-note {
    font-size: 0.7rem;
    color: var(--bark-light);
    font-style: italic;
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: var(--terracotta);
    color: var(--white);
    border: none;
    font-size: 1.6rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(193,96,58,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, background 0.15s;
    z-index: 200;
  }
  .fab:hover { background: var(--bark); transform: scale(1.08); }
  .fab:active { transform: scale(0.95); }

  /* ── OVERLAY ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(92,61,46,0.45);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
  }
  .overlay.open { display: flex; }

  .sheet {
    background: var(--white);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 0 0 40px;
    animation: slideUp 0.28s ease;
    position: relative;
  }
  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .sheet-handle {
    width: 40px; height: 4px;
    background: var(--parchment);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .sheet-hero {
    width: 100%; height: 180px;
    background: var(--parchment);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    margin-top: 8px;
  }
  .sheet-content { padding: 18px 22px 0; }

  .sheet-category {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--bark-light);
    margin-bottom: 4px;
  }
  .sheet-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--bark);
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .sheet-badges { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .badge {
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .badge-time { background: var(--parchment); color: var(--bark-light); }

  /* ── ACTION BUTTONS ── */
  .sheet-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .btn-action {
    flex: 1;
    padding: 9px 0;
    border-radius: 10px;
    border: 1.5px solid var(--parchment);
    background: var(--white);
    color: var(--bark-light);
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .btn-action:hover { border-color: var(--terracotta); color: var(--terracotta); background: #FFF5F1; }
  .btn-action.danger:hover { border-color: #b94040; color: #b94040; background: #fff5f5; }

  /* ── NOTA ── */
  .nota-box {
    background: var(--parchment);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 18px;
  }
  .nota-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--bark-light);
    margin-bottom: 6px;
  }
  .nota-text {
    font-size: 0.88rem;
    color: var(--bark);
    line-height: 1.5;
    font-style: italic;
    min-height: 20px;
  }
  .nota-text.vacia { color: var(--bark-light); font-style: normal; }
  .nota-input {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'Nunito', sans-serif;
    font-size: 0.88rem;
    color: var(--bark);
    resize: none;
    outline: none;
    line-height: 1.5;
    min-height: 60px;
    font-style: italic;
  }
  .nota-save-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
    gap: 8px;
  }
  .btn-nota {
    padding: 5px 14px;
    border-radius: 8px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
  }
  .btn-nota-cancel { background: transparent; color: var(--bark-light); }
  .btn-nota-save   { background: var(--terracotta); color: var(--white); }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--bark-light);
    margin: 20px 0 10px;
  }

  .ingredient-list { list-style: none; }
  .ingredient-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--parchment);
    font-size: 0.9rem;
  }
  .ingredient-list li::before {
    content: '';
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--clay);
    flex-shrink: 0;
  }

  .steps-list { list-style: none; counter-reset: steps; }
  .steps-list li {
    counter-increment: steps;
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--parchment);
    font-size: 0.9rem;
    line-height: 1.5;
  }
  .steps-list li::before {
    content: counter(steps);
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--terracotta);
    color: var(--white);
    font-size: 0.7rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* ── EDIT FORM ── */
  .edit-form { display: none; }
  .edit-form.visible { display: block; }
  .view-mode.hidden { display: none; }

  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--bark-light);
    margin-bottom: 5px;
    display: block;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--parchment);
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.88rem;
    color: var(--bark);
    background: var(--white);
    outline: none;
    transition: border-color 0.18s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--clay);
  }
  .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .form-hint {
    font-size: 0.72rem;
    color: var(--bark-light);
    margin-top: 4px;
  }
  .edit-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .btn-cancel-edit {
    flex: 1;
    padding: 11px;
    border-radius: 12px;
    border: 1.5px solid var(--parchment);
    background: var(--white);
    color: var(--bark-light);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
  }
  .btn-save-edit {
    flex: 2;
    padding: 11px;
    border-radius: 12px;
    border: none;
    background: var(--terracotta);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    cursor: pointer;
  }

  .btn-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--parchment);
    border: none;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--bark);
    z-index: 10;
  }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 48px 20px; color: var(--bark-light); }
  .empty .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty p { font-size: 0.9rem; line-height: 1.5; }

  @media (min-width: 500px) {
    .cards-grid { grid-template-columns: 1fr 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="logo-flame">🍳</span>
    <h1>Nuestro <span>Menú</span></h1>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="filtrar('todos', this)">Todos</button>
    <button class="filter-btn" onclick="filtrar('desayuno', this)">☀️ Desayuno</button>
    <button class="filter-btn" onclick="filtrar('comida', this)">🍽 Comida</button>
    <button class="filter-btn" onclick="filtrar('cena', this)">🌙 Cena</button>
    <button class="filter-btn" onclick="filtrar('antojo', this)">🍟 Antojo</button>
    <button class="filter-btn" onclick="filtrar('postre', this)">🍮 Postre</button>
  </div>
</header>

<main>
  <div class="surprise-bar">
    <p><em>¿Sin ideas?</em><br>Déjate sorprender hoy</p>
    <button class="btn-surprise" onclick="sorprender()">🎲 Sorpréndeme</button>
  </div>
  <p class="section-label">Platillos guardados</p>
  <div class="cards-grid" id="grid"></div>
</main>

<button class="fab" title="Agregar platillo" onclick="alert('¡Aquí irá el formulario de nuevo platillo!')">＋</button>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="cerrarModal(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <button class="btn-close" onclick="cerrarOverlay()">✕</button>

    <div class="sheet-hero" id="modal-emoji"></div>

    <div class="sheet-content">

      <!-- ── VISTA NORMAL ── -->
      <div id="view-mode">
        <p class="sheet-category" id="modal-cat"></p>
        <h2 class="sheet-title" id="modal-title"></h2>
        <div class="sheet-badges">
          <span class="badge badge-time" id="modal-time"></span>
        </div>

        <!-- Botones Editar / Eliminar -->
        <div class="sheet-actions">
          <button class="btn-action" onclick="entrarEdicion()">✏️ Editar platillo</button>
          <button class="btn-action danger" onclick="eliminarPlatillo()">🗑 Eliminar</button>
        </div>

        <!-- Nota libre -->
        <div class="nota-box" id="nota-box">
          <p class="nota-label">📝 Nota</p>
          <div id="nota-display" onclick="editarNota()"></div>
          <div id="nota-editor" style="display:none;">
            <textarea class="nota-input" id="nota-input" placeholder="Ej. queda mejor con chile de árbol…"></textarea>
            <div class="nota-save-row">
              <button class="btn-nota btn-nota-cancel" onclick="cancelarNota()">Cancelar</button>
              <button class="btn-nota btn-nota-save" onclick="guardarNota()">Guardar nota</button>
            </div>
          </div>
        </div>

        <p class="section-title">Ingredientes</p>
        <ul class="ingredient-list" id="modal-ing"></ul>
        <p class="section-title">Preparación</p>
        <ol class="steps-list" id="modal-steps"></ol>
      </div>

      <!-- ── MODO EDICIÓN ── -->
      <div id="edit-mode" class="edit-form">
        <p class="section-title" style="margin-top:0">Editar platillo</p>

        <div class="form-group">
          <label class="form-label">Emoji</label>
          <input class="form-input" id="edit-emoji" type="text" maxlength="2" placeholder="🍝">
        </div>
        <div class="form-group">
          <label class="form-label">Nombre</label>
          <input class="form-input" id="edit-nombre" type="text" placeholder="Nombre del platillo">
        </div>
        <div class="form-group">
          <label class="form-label">Categoría</label>
          <select class="form-select" id="edit-cat">
            <option value="desayuno">☀️ Desayuno</option>
            <option value="comida">🍽 Comida</option>
            <option value="cena">🌙 Cena</option>
            <option value="antojo">🍟 Antojo</option>
            <option value="postre">🍮 Postre</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Tiempo estimado</label>
          <input class="form-input" id="edit-tiempo" type="text" placeholder="Ej. 30 min">
        </div>
        <div class="form-group">
          <label class="form-label">Ingredientes</label>
          <textarea class="form-textarea" id="edit-ing" placeholder="Un ingrediente por línea"></textarea>
          <p class="form-hint">Escribe un ingrediente por línea</p>
        </div>
        <div class="form-group">
          <label class="form-label">Pasos de preparación</label>
          <textarea class="form-textarea" id="edit-pasos" style="min-height:120px" placeholder="Un paso por línea"></textarea>
          <p class="form-hint">Escribe un paso por línea</p>
        </div>

        <div class="edit-actions">
          <button class="btn-cancel-edit" onclick="cancelarEdicion()">Cancelar</button>
          <button class="btn-save-edit" onclick="guardarEdicion()">Guardar cambios</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  let platillos = [
    {
      id: 1, nombre: "Chilaquiles verdes", categoria: "desayuno",
      tiempo: "30 min", emoji: "🌮", nota: "Con huevo estrellado encima quedan increíbles",
      ingredientes: ["Tortillas en triángulos", "Salsa verde (250 ml)", "Crema ácida", "Queso fresco", "Cebolla", "Cilantro", "2 huevos (opcional)"],
      pasos: ["Fríe los triángulos de tortilla en aceite hasta dorar. Escurre en papel.", "Calienta la salsa verde en un sartén a fuego medio.", "Agrega los totopos y mezcla hasta que estén bien bañados.", "Sirve de inmediato con crema, queso, cebolla y cilantro encima."]
    },
    {
      id: 2, nombre: "Pasta alfredo", categoria: "comida",
      tiempo: "25 min", emoji: "🍝", nota: "",
      ingredientes: ["250 g pasta", "200 ml crema", "50 g mantequilla", "Ajo (2 dientes)", "Parmesano rallado", "Sal y pimienta"],
      pasos: ["Cuece la pasta en agua con sal según el paquete.", "En sartén, derrite mantequilla y acitrona el ajo picado.", "Agrega la crema, deja reducir 3 minutos a fuego bajo.", "Incorpora la pasta colada y el parmesano. Mezcla y sirve."]
    },
    {
      id: 3, nombre: "Quesadillas de flor", categoria: "antojo",
      tiempo: "20 min", emoji: "🧀", nota: "",
      ingredientes: ["4 tortillas de maíz", "Flor de calabaza (1 taza)", "Quesillo o Oaxaca", "Epazote", "Sal"],
      pasos: ["Limpia la flor de calabaza, retira los tallos y sépalos.", "Calienta el comal a fuego medio.", "Rellena cada tortilla con flor, queso y epazote.", "Dobla y cocina 3 min por lado hasta que el queso derrita."]
    },
    {
      id: 4, nombre: "Hotcakes de avena", categoria: "desayuno",
      tiempo: "20 min", emoji: "🥞", nota: "Con plátano en rebanadas encima están de lujo",
      ingredientes: ["1 taza avena en hojuelas", "1 taza leche", "2 huevos", "1 cucharadita polvo para hornear", "Miel o maple para servir"],
      pasos: ["Licúa todos los ingredientes hasta obtener una mezcla uniforme.", "Calienta un sartén antiadherente con un poco de mantequilla.", "Vierte porciones y cocina hasta que burbujee la superficie.", "Voltea y dora 1 min más. Sirve con miel."]
    },
    {
      id: 5, nombre: "Sopa de lima", categoria: "comida",
      tiempo: "45 min", emoji: "🍋", nota: "",
      ingredientes: ["1 pechuga de pollo", "Caldo de pollo (1 L)", "2 limas", "Tomate", "Cebolla", "Chile dulce", "Tortillas fritas"],
      pasos: ["Cuece el pollo en el caldo con sal. Deshebrala.", "Sofríe tomate, cebolla y chile en aceite, añade al caldo.", "Agrega el pollo y el jugo de las limas. Ajusta sal.", "Sirve caliente con tortillas fritas encima."]
    },
    {
      id: 6, nombre: "Flan napolitano", categoria: "postre",
      tiempo: "1 h 15 min", emoji: "🍮", nota: "Mejor de un día para otro en el refri",
      ingredientes: ["1 lata leche condensada", "1 lata leche evaporada", "3 huevos", "1 cucharadita vainilla", "½ taza azúcar (caramelo)"],
      pasos: ["Derrite el azúcar en el molde a fuego bajo hasta caramelizar.", "Licúa leches, huevos y vainilla. Vierte en el molde.", "Hornea a baño María a 180 °C por 50-60 min.", "Deja enfriar, refrigera 2 h mínimo. Desmolda y sirve."]
    }
  ];

  let filtroActivo = 'todos';
  let idActivo = null;

  // ── RENDER GRID ──
  function renderGrid(lista) {
    const grid = document.getElementById('grid');
    if (lista.length === 0) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">🍽️</div>
        <p>No hay platillos en esta categoría todavía.</p>
      </div>`;
      return;
    }
    grid.innerHTML = lista.map(p => `
      <div class="card" onclick="abrirReceta(${p.id})">
        <div class="card-img">${p.emoji}</div>
        <div class="card-body">
          <p class="card-name">${p.nombre}</p>
          <p class="card-time">⏱ ${p.tiempo}</p>
          ${p.nota ? `<p class="card-note">💬 ${p.nota}</p>` : ''}
        </div>
      </div>
    `).join('');
  }

  function filtrar(cat, btn) {
    filtroActivo = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const lista = cat === 'todos' ? platillos : platillos.filter(p => p.categoria === cat);
    renderGrid(lista);
  }

  // ── ABRIR RECETA ──
  function abrirReceta(id) {
    idActivo = id;
    const p = platillos.find(x => x.id === id);
    if (!p) return;

    // resetear a view mode
    document.getElementById('view-mode').style.display = '';
    document.getElementById('edit-mode').classList.remove('visible');

    poblarModal(p);
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function poblarModal(p) {
    document.getElementById('modal-emoji').textContent = p.emoji;
    document.getElementById('modal-cat').textContent = p.categoria.charAt(0).toUpperCase() + p.categoria.slice(1);
    document.getElementById('modal-title').textContent = p.nombre;
    document.getElementById('modal-time').textContent = '⏱ ' + p.tiempo;
    document.getElementById('modal-ing').innerHTML = p.ingredientes.map(i => `<li>${i}</li>`).join('');
    document.getElementById('modal-steps').innerHTML = p.pasos.map(s => `<li>${s}</li>`).join('');
    renderNota(p.nota);
  }

  // ── NOTA ──
  function renderNota(nota) {
    const display = document.getElementById('nota-display');
    const editor  = document.getElementById('nota-editor');
    editor.style.display = 'none';
    if (nota) {
      display.className = 'nota-text';
      display.textContent = nota;
      display.title = 'Toca para editar';
      display.style.cursor = 'pointer';
    } else {
      display.className = 'nota-text vacia';
      display.textContent = 'Toca para agregar una nota…';
      display.style.cursor = 'pointer';
    }
    display.style.display = '';
  }

  function editarNota() {
    const p = platillos.find(x => x.id === idActivo);
    document.getElementById('nota-display').style.display = 'none';
    document.getElementById('nota-editor').style.display = '';
    document.getElementById('nota-input').value = p.nota || '';
    document.getElementById('nota-input').focus();
  }

  function guardarNota() {
    const p = platillos.find(x => x.id === idActivo);
    p.nota = document.getElementById('nota-input').value.trim();
    renderNota(p.nota);
    // actualiza card en grid
    renderGridActual();
  }

  function cancelarNota() {
    const p = platillos.find(x => x.id === idActivo);
    renderNota(p.nota);
  }

  // ── EDICIÓN ──
  function entrarEdicion() {
    const p = platillos.find(x => x.id === idActivo);
    document.getElementById('view-mode').style.display = 'none';
    document.getElementById('edit-mode').classList.add('visible');

    document.getElementById('edit-emoji').value  = p.emoji;
    document.getElementById('edit-nombre').value = p.nombre;
    document.getElementById('edit-cat').value    = p.categoria;
    document.getElementById('edit-tiempo').value = p.tiempo;
    document.getElementById('edit-ing').value    = p.ingredientes.join('\n');
    document.getElementById('edit-pasos').value  = p.pasos.join('\n');

    // scroll al top del sheet
    document.getElementById('sheet').scrollTop = 0;
  }

  function cancelarEdicion() {
    document.getElementById('view-mode').style.display = '';
    document.getElementById('edit-mode').classList.remove('visible');
  }

  function guardarEdicion() {
    const p = platillos.find(x => x.id === idActivo);
    p.emoji      = document.getElementById('edit-emoji').value.trim() || p.emoji;
    p.nombre     = document.getElementById('edit-nombre').value.trim() || p.nombre;
    p.categoria  = document.getElementById('edit-cat').value;
    p.tiempo     = document.getElementById('edit-tiempo').value.trim() || p.tiempo;
    p.ingredientes = document.getElementById('edit-ing').value.split('\n').map(s => s.trim()).filter(Boolean);
    p.pasos        = document.getElementById('edit-pasos').value.split('\n').map(s => s.trim()).filter(Boolean);

    cancelarEdicion();
    poblarModal(p);
    renderGridActual();
  }

  // ── ELIMINAR ──
  function eliminarPlatillo() {
    if (!confirm(`¿Eliminar "${platillos.find(x=>x.id===idActivo)?.nombre}"?`)) return;
    platillos = platillos.filter(x => x.id !== idActivo);
    cerrarOverlay();
    renderGridActual();
  }

  function renderGridActual() {
    const lista = filtroActivo === 'todos' ? platillos : platillos.filter(p => p.categoria === filtroActivo);
    renderGrid(lista);
  }

  // ── CERRAR ──
  function cerrarOverlay() {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  function cerrarModal(e) {
    if (e.target === document.getElementById('overlay')) cerrarOverlay();
  }

  // ── SORPRESA ──
  function sorprender() {
    const lista = filtroActivo === 'todos' ? platillos : platillos.filter(p => p.categoria === filtroActivo);
    if (!lista.length) return;
    abrirReceta(lista[Math.floor(Math.random() * lista.length)].id);
  }

  // Inicializar
  renderGrid(platillos);
</script>
</body>
</html>
