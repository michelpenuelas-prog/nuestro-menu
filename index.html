<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestro Menú</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --terracotta: #C1603A;
    --clay:       #D98B5F;
    --cream:      #FDF6ED;
    --parchment:  #F2E8D9;
    --bark:       #5C3D2E;
    --bark-light: #8A6050;
    --white:      #FFFFFF;
    --shadow:     rgba(92,61,46,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--bark); min-height: 100vh; }

  /* HEADER */
  header { background: var(--bark); padding: 20px 20px 0; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px var(--shadow); }
  .header-top { display: flex; align-items: center; justify-content: center; gap: 10px; padding-bottom: 14px; }
  .logo-flame { font-size: 26px; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--cream); }
  header h1 span { color: var(--clay); font-style: italic; }
  .filters { display: flex; gap: 6px; overflow-x: auto; padding: 0 4px 12px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; background: transparent; border: 1.5px solid var(--bark-light); color: var(--parchment); border-radius: 20px; padding: 5px 14px; font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .filter-btn.active, .filter-btn:hover { background: var(--terracotta); border-color: var(--terracotta); color: var(--white); }

  /* MAIN */
  main { padding: 20px 16px 100px; max-width: 480px; margin: 0 auto; }

  /* SURPRISE */
  .surprise-bar { background: linear-gradient(135deg, var(--terracotta), var(--clay)); border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; box-shadow: 0 4px 14px rgba(193,96,58,0.25); }
  .surprise-bar p { color: var(--white); font-size: 0.85rem; font-weight: 600; line-height: 1.3; }
  .surprise-bar p em { font-style: normal; font-size: 1rem; font-family: 'Playfair Display', serif; }
  .btn-surprise { background: var(--white); color: var(--terracotta); border: none; border-radius: 10px; padding: 8px 14px; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.82rem; cursor: pointer; flex-shrink: 0; }

  .section-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bark-light); margin-bottom: 12px; }

  /* CARDS */
  .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background: var(--white); border-radius: 16px; overflow: hidden; box-shadow: 0 2px 10px var(--shadow); cursor: pointer; transition: transform 0.18s, box-shadow 0.18s; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px var(--shadow); }
  .card:active { transform: scale(0.98); }
  .card-img { width: 100%; aspect-ratio: 1/1; background: var(--parchment); display: flex; align-items: center; justify-content: center; font-size: 2.4rem; }
  .card-body { padding: 10px 12px 12px; }
  .card-name { font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 700; color: var(--bark); line-height: 1.2; margin-bottom: 4px; }
  .card-time { font-size: 0.72rem; color: var(--bark-light); }
  .card-note { font-size: 0.7rem; color: var(--bark-light); font-style: italic; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* FAB */
  .fab { position: fixed; bottom: 24px; right: 20px; width: 54px; height: 54px; border-radius: 50%; background: var(--terracotta); color: var(--white); border: none; font-size: 1.6rem; cursor: pointer; box-shadow: 0 4px 16px rgba(193,96,58,0.4); display: flex; align-items: center; justify-content: center; transition: transform 0.15s, background 0.15s; z-index: 200; }
  .fab:hover { background: var(--bark); transform: scale(1.08); }

  /* OVERLAY */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(92,61,46,0.45); z-index: 300; align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }
  .sheet { background: var(--white); border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; padding: 0 0 40px; animation: slideUp 0.28s ease; position: relative; }
  @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .sheet-handle { width: 40px; height: 4px; background: var(--parchment); border-radius: 2px; margin: 12px auto 0; }
  .sheet-hero { width: 100%; height: 180px; background: var(--parchment); display: flex; align-items: center; justify-content: center; font-size: 5rem; margin-top: 8px; }
  .sheet-content { padding: 18px 22px 0; }
  .sheet-category { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bark-light); margin-bottom: 4px; }
  .sheet-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--bark); margin-bottom: 8px; line-height: 1.2; }
  .badge { font-size: 0.75rem; font-weight: 700; padding: 4px 12px; border-radius: 20px; background: var(--parchment); color: var(--bark-light); display: inline-block; margin-bottom: 16px; }

  /* ACCIONES */
  .sheet-actions { display: flex; gap: 8px; margin-bottom: 18px; }
  .btn-action { flex: 1; padding: 9px 0; border-radius: 10px; border: 1.5px solid var(--parchment); background: var(--white); color: var(--bark-light); font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.18s; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .btn-action:hover { border-color: var(--terracotta); color: var(--terracotta); background: #FFF5F1; }
  .btn-action.danger:hover { border-color: #b94040; color: #b94040; background: #fff5f5; }

  /* NOTA */
  .nota-box { background: var(--parchment); border-radius: 12px; padding: 12px 14px; margin-bottom: 18px; }
  .nota-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--bark-light); margin-bottom: 6px; }
  .nota-text { font-size: 0.88rem; color: var(--bark); line-height: 1.5; font-style: italic; cursor: pointer; min-height: 20px; }
  .nota-text.vacia { color: var(--bark-light); font-style: normal; }
  .nota-input { width: 100%; border: none; background: transparent; font-family: 'Nunito', sans-serif; font-size: 0.88rem; color: var(--bark); resize: none; outline: none; line-height: 1.5; min-height: 60px; font-style: italic; }
  .nota-save-row { display: flex; justify-content: flex-end; margin-top: 8px; gap: 8px; }
  .btn-nota { padding: 5px 14px; border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; border: none; }
  .btn-nota-cancel { background: transparent; color: var(--bark-light); }
  .btn-nota-save { background: var(--terracotta); color: var(--white); }

  /* INGREDIENTES CON SECCIONES */
  .ing-seccion { margin-bottom: 14px; }
  .ing-seccion-titulo {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--bark-light);
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 6px; padding-bottom: 4px;
    border-bottom: 1px solid var(--parchment);
  }
  .ingredient-list { list-style: none; }
  .ingredient-list li { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--parchment); font-size: 0.9rem; }
  .ingredient-list li::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--clay); flex-shrink: 0; }

  /* PASOS */
  .section-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bark-light); margin: 20px 0 10px; }
  .steps-list { list-style: none; counter-reset: steps; }
  .steps-list li { counter-increment: steps; display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--parchment); font-size: 0.9rem; line-height: 1.5; }
  .steps-list li::before { content: counter(steps); width: 24px; height: 24px; border-radius: 50%; background: var(--terracotta); color: var(--white); font-size: 0.7rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }

  /* FORM */
  .edit-form { display: none; }
  .edit-form.visible { display: block; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--bark-light); margin-bottom: 5px; display: block; }
  .form-input, .form-select, .form-textarea { width: 100%; padding: 9px 12px; border: 1.5px solid var(--parchment); border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 0.88rem; color: var(--bark); background: var(--white); outline: none; transition: border-color 0.18s; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--clay); }
  .form-textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
  .form-hint { font-size: 0.72rem; color: var(--bark-light); margin-top: 4px; }

  /* EMOJI SUGERENCIAS */
  .emoji-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; min-height: 36px; }
  .emoji-sugerido { font-size: 1.5rem; cursor: pointer; padding: 4px; border-radius: 8px; transition: background 0.15s; border: 2px solid transparent; }
  .emoji-sugerido:hover { background: var(--parchment); }
  .emoji-sugerido.seleccionado { border-color: var(--terracotta); background: #FFF5F1; }

  /* SECCIONES INGREDIENTES EN FORM */
  .ing-tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .ing-tab { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--parchment); background: var(--white); color: var(--bark-light); font-family: 'Nunito', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.18s; }
  .ing-tab.active { background: var(--terracotta); border-color: var(--terracotta); color: var(--white); }
  .ing-section-form { display: none; }
  .ing-section-form.visible { display: block; }

  .edit-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel-edit { flex: 1; padding: 11px; border-radius: 12px; border: 1.5px solid var(--parchment); background: var(--white); color: var(--bark-light); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; }
  .btn-save-edit { flex: 2; padding: 11px; border-radius: 12px; border: none; background: var(--terracotta); color: var(--white); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; }

  .btn-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 50%; background: var(--parchment); border: none; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--bark); z-index: 10; }

  .empty { text-align: center; padding: 48px 20px; color: var(--bark-light); grid-column: 1/-1; }
  .empty .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty p { font-size: 0.9rem; line-height: 1.5; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bark); color: var(--white); padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (min-width: 500px) { .cards-grid { grid-template-columns: 1fr 1fr 1fr; } }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="logo-flame">🍳</span>
    <h1>Nuestro <span>Menú</span></h1>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="filtrar('todos', this)">Todos</button>
    <button class="filter-btn" onclick="filtrar('desayuno', this)">☀️ Desayuno</button>
    <button class="filter-btn" onclick="filtrar('comida', this)">🍽 Comida</button>
    <button class="filter-btn" onclick="filtrar('cena', this)">🌙 Cena</button>
    <button class="filter-btn" onclick="filtrar('antojo', this)">🍟 Antojo</button>
    <button class="filter-btn" onclick="filtrar('postre', this)">🍮 Postre</button>
  </div>
</header>

<main>
  <div class="surprise-bar">
    <p><em>¿Sin ideas?</em><br>Déjate sorprender hoy</p>
    <button class="btn-surprise" onclick="sorprender()">🎲 Sorpréndeme</button>
  </div>
  <p class="section-label">Platillos guardados</p>
  <div class="cards-grid" id="grid">
    <div class="empty"><div class="empty-icon">⏳</div><p>Cargando platillos…</p></div>
  </div>
</main>

<button class="fab" onclick="abrirNuevo()">＋</button>
<div class="toast" id="toast"></div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="cerrarModal(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <button class="btn-close" onclick="cerrarOverlay()">✕</button>
    <div class="sheet-hero" id="modal-emoji"></div>

    <div class="sheet-content">

      <!-- VISTA RECETA -->
      <div id="view-mode">
        <p class="sheet-category" id="modal-cat"></p>
        <h2 class="sheet-title" id="modal-title"></h2>
        <span class="badge" id="modal-time"></span>
        <div class="sheet-actions">
          <button class="btn-action" onclick="entrarEdicion()">✏️ Editar</button>
          <button class="btn-action danger" onclick="eliminarPlatillo()">🗑 Eliminar</button>
        </div>
        <div class="nota-box">
          <p class="nota-label">📝 Nota</p>
          <div id="nota-display" onclick="editarNota()"></div>
          <div id="nota-editor" style="display:none">
            <textarea class="nota-input" id="nota-input" placeholder="Ej. queda mejor con chile de árbol…"></textarea>
            <div class="nota-save-row">
              <button class="btn-nota btn-nota-cancel" onclick="cancelarNota()">Cancelar</button>
              <button class="btn-nota btn-nota-save" onclick="guardarNota()">Guardar nota</button>
            </div>
          </div>
        </div>
        <div id="modal-ingredientes"></div>
        <p class="section-title">Preparación</p>
        <ol class="steps-list" id="modal-steps"></ol>
      </div>

      <!-- FORMULARIO -->
      <div id="edit-mode" class="edit-form">
        <p class="section-title" id="form-title" style="margin-top:0">Nuevo platillo</p>

        <!-- Nombre con sugerencias de emoji -->
        <div class="form-group">
          <label class="form-label">Nombre del platillo</label>
          <input class="form-input" id="edit-nombre" type="text" placeholder="Ej. Tacos de pollo" oninput="sugerirEmojis(this.value)">
        </div>

        <div class="form-group">
          <label class="form-label">Emoji <span style="font-weight:400;text-transform:none;letter-spacing:0">(toca una sugerencia o escribe el tuyo)</span></label>
          <div class="emoji-row" id="emoji-sugerencias"></div>
          <input class="form-input" id="edit-emoji" type="text" maxlength="2" placeholder="🍽" style="margin-top:8px">
        </div>

        <div class="form-group">
          <label class="form-label">Categoría</label>
          <select class="form-select" id="edit-cat">
            <option value="desayuno">☀️ Desayuno</option>
            <option value="comida">🍽 Comida</option>
            <option value="cena">🌙 Cena</option>
            <option value="antojo">🍟 Antojo</option>
            <option value="postre">🍮 Postre</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Tiempo estimado</label>
          <input class="form-input" id="edit-tiempo" type="text" placeholder="Ej. 30 min">
        </div>

        <!-- Ingredientes por sección -->
        <div class="form-group">
          <label class="form-label">Ingredientes</label>
          <div class="ing-tabs">
            <button class="ing-tab active" onclick="cambiarSeccion('principal', this)">🥩 Principal</button>
            <button class="ing-tab" onclick="cambiarSeccion('verduras', this)">🥦 Verduras</button>
            <button class="ing-tab" onclick="cambiarSeccion('sazonadores', this)">🧂 Sazonadores</button>
            <button class="ing-tab" onclick="cambiarSeccion('extras', this)">🫙 Extras</button>
          </div>
          <div id="sec-principal" class="ing-section-form visible">
            <textarea class="form-textarea" id="ing-principal" placeholder="Ej. 500 g pechuga de pollo&#10;2 dientes de ajo"></textarea>
          </div>
          <div id="sec-verduras" class="ing-section-form">
            <textarea class="form-textarea" id="ing-verduras" placeholder="Ej. 1 cebolla&#10;2 jitomates&#10;Chile serrano"></textarea>
          </div>
          <div id="sec-sazonadores" class="ing-section-form">
            <textarea class="form-textarea" id="ing-sazonadores" placeholder="Ej. Sal al gusto&#10;Pimienta&#10;Comino&#10;Orégano"></textarea>
          </div>
          <div id="sec-extras" class="ing-section-form">
            <textarea class="form-textarea" id="ing-extras" placeholder="Ej. Crema para servir&#10;Queso rallado (opcional)"></textarea>
          </div>
          <p class="form-hint">Un ingrediente por línea en cada sección</p>
        </div>

        <div class="form-group">
          <label class="form-label">Pasos de preparación</label>
          <textarea class="form-textarea" id="edit-pasos" style="min-height:120px" placeholder="Un paso por línea"></textarea>
          <p class="form-hint">Escribe un paso por línea</p>
        </div>

        <div class="edit-actions">
          <button class="btn-cancel-edit" onclick="cancelarEdicion()">Cancelar</button>
          <button class="btn-save-edit" id="btn-guardar" onclick="guardarForm()">Agregar platillo</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx-1gjiBAb3KWzxF3Rh-xhUPLqyJ7ltz8fhFHILK6Hwwf70PLpKv_E2U4HiQifls65M/exec';

  // Mapa de palabras clave → emojis sugeridos
  const EMOJI_MAP = [
    { keys: ['pollo','chicken','pechuga','alita','muslo'],          emojis: ['🍗','🍖','🥘','🫕','🍲','🌮'] },
    { keys: ['pasta','espagueti','fideo','tallarín','lasaña'],      emojis: ['🍝','🍜','🫕','🥗','🧆'] },
    { keys: ['taco','tortilla','quesadilla','burrito','fajita'],    emojis: ['🌮','🫔','🌯','🥙','🧆'] },
    { keys: ['pizza'],                                               emojis: ['🍕','🧀','🫕'] },
    { keys: ['sopa','caldo','consomé','pozole','menudo'],           emojis: ['🍲','🫕','🥘','🍜','🥣'] },
    { keys: ['ensalada','vegano','vegetariano','verdura'],          emojis: ['🥗','🥦','🥬','🫑','🥕'] },
    { keys: ['huevo','omelette','revuelto','estrellado'],           emojis: ['🍳','🥚','🥘','🧇'] },
    { keys: ['hotcake','pancake','waffle','crepa'],                 emojis: ['🥞','🧇','🍓','🫐'] },
    { keys: ['arroz','risotto'],                                    emojis: ['🍚','🥘','🫕','🍲'] },
    { keys: ['carne','bistec','milanesa','res','cerdo','costilla'], emojis: ['🥩','🍖','🫕','🥘','🌮'] },
    { keys: ['hamburguesa','burger'],                               emojis: ['🍔','🍟','🥪'] },
    { keys: ['sandwich','torta','pambazo','cemita'],                emojis: ['🥪','🫓','🌮','🥙'] },
    { keys: ['sushi','maki','roll'],                                emojis: ['🍱','🍣','🍜'] },
    { keys: ['mariscos','camarón','pescado','atún','pulpo'],        emojis: ['🦐','🐟','🦑','🦞','🫕'] },
    { keys: ['flan','pastel','pay','tarta','postre','galleta'],     emojis: ['🍮','🎂','🍰','🍪','🧁'] },
    { keys: ['helado','nieve','paleta'],                            emojis: ['🍦','🍨','🍧','🍡'] },
    { keys: ['chocolate','brownie'],                                emojis: ['🍫','🍰','🧁','🍪'] },
    { keys: ['fruta','smoothie','licuado'],                         emojis: ['🍓','🫐','🥭','🍉','🍹'] },
    { keys: ['chile','enchilada','mole'],                           emojis: ['🌶️','🫕','🥘','🌮','🍲'] },
    { keys: ['chilaquil'],                                          emojis: ['🌮','🥘','🍳','🌶️'] },
    { keys: ['tamale','tamal'],                                     emojis: ['🫔','🌽','🥘'] },
    { keys: ['elote','maíz','esquite'],                             emojis: ['🌽','🧀','🌶️'] },
    { keys: ['café','capuchino','latte'],                           emojis: ['☕','🫖','🍵'] },
    { keys: ['jugo','agua','limonada'],                             emojis: ['🥤','🍹','🍋','🫖'] },
  ];

  let platillos = [];
  let filtroActivo = 'todos';
  let idActivo = null;
  let modoForm = 'nuevo';

  // ── TOAST ──
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── CARGAR ──
  async function cargarPlatillos() {
    try {
      const res = await fetch(SCRIPT_URL);
      const data = await res.json();
      platillos = data.map(p => ({
        id:          p.ID,
        nombre:      p.Nombre,
        categoria:   (p.Categoria || '').toLowerCase(),
        tiempo:      p.Tiempo,
        emoji:       p.Emoji,
        nota:        p.Nota || '',
        ingredientes: parsearIngredientes(p.Ingredientes || ''),
        pasos:        p.pasos || []
      }));
      renderGridActual();
    } catch {
      document.getElementById('grid').innerHTML =
        '<div class="empty"><div class="empty-icon">⚠️</div><p>No se pudo conectar.<br>Verifica tu conexión.</p></div>';
    }
  }

  // ── PARSEAR INGREDIENTES ──
  // Formato en Sheet: "principal:Pollo|Ajo;;verduras:Cebolla|Jitomate;;sazonadores:Sal|Pimienta;;extras:Crema"
  // Si no tiene prefijo de sección, todo va a Principal (compatibilidad con datos viejos)
  function parsearIngredientes(raw) {
    if (!raw) return { principal: [], verduras: [], sazonadores: [], extras: [] };
    if (raw.includes(';;')) {
      const secciones = { principal: [], verduras: [], sazonadores: [], extras: [] };
      raw.split(';;').forEach(bloque => {
        const [key, items] = bloque.split(':');
        if (key && items && secciones[key] !== undefined) {
          secciones[key] = items.split('|').map(s => s.trim()).filter(Boolean);
        }
      });
      return secciones;
    }
    // datos viejos sin secciones → todo a principal
    return {
      principal:   raw.split('|').map(s => s.trim()).filter(Boolean),
      verduras:    [],
      sazonadores: [],
      extras:      []
    };
  }

  function serializarIngredientes(secs) {
    return ['principal','verduras','sazonadores','extras']
      .filter(k => secs[k] && secs[k].length)
      .map(k => `${k}:${secs[k].join('|')}`)
      .join(';;');
  }

  // ── RENDER GRID ──
  function renderGrid(lista) {
    const grid = document.getElementById('grid');
    if (!lista.length) {
      grid.innerHTML = '<div class="empty"><div class="empty-icon">🍽️</div><p>No hay platillos aquí todavía.<br>Toca ＋ para agregar uno.</p></div>';
      return;
    }
    grid.innerHTML = lista.map(p => `
      <div class="card" onclick="abrirReceta('${p.id}')">
        <div class="card-img">${p.emoji || '🍽'}</div>
        <div class="card-body">
          <p class="card-name">${p.nombre}</p>
          <p class="card-time">⏱ ${p.tiempo}</p>
          ${p.nota ? `<p class="card-note">💬 ${p.nota}</p>` : ''}
        </div>
      </div>
    `).join('');
  }

  function renderGridActual() {
    const lista = filtroActivo === 'todos' ? platillos : platillos.filter(p => p.categoria === filtroActivo);
    renderGrid(lista);
  }

  function filtrar(cat, btn) {
    filtroActivo = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGridActual();
  }

  // ── MODAL ──
  function abrirReceta(id) {
    idActivo = id;
    const p = platillos.find(x => String(x.id) === String(id));
    if (!p) return;
    mostrarViewMode();
    poblarModal(p);
    abrirOverlay();
  }

  function poblarModal(p) {
    document.getElementById('modal-emoji').textContent = p.emoji || '🍽';
    document.getElementById('modal-cat').textContent   = (p.categoria || '').charAt(0).toUpperCase() + (p.categoria || '').slice(1);
    document.getElementById('modal-title').textContent = p.nombre;
    document.getElementById('modal-time').textContent  = '⏱ ' + p.tiempo;
    document.getElementById('modal-steps').innerHTML   = (p.pasos || []).map(s => `<li>${s}</li>`).join('');
    renderIngredientesModal(p.ingredientes);
    renderNota(p.nota);
  }

  function renderIngredientesModal(ings) {
    const SECCIONES = [
      { key: 'principal',   label: '🥩 Principal' },
      { key: 'verduras',    label: '🥦 Verduras' },
      { key: 'sazonadores', label: '🧂 Sazonadores' },
      { key: 'extras',      label: '🫙 Extras' },
    ];
    const contenedor = document.getElementById('modal-ingredientes');
    let html = '';
    SECCIONES.forEach(({ key, label }) => {
      const items = ings[key] || [];
      if (!items.length) return;
      html += `<div class="ing-seccion">
        <p class="ing-seccion-titulo">${label}</p>
        <ul class="ingredient-list">${items.map(i => `<li>${i}</li>`).join('')}</ul>
      </div>`;
    });
    contenedor.innerHTML = html || '<p class="form-hint" style="margin:8px 0">Sin ingredientes registrados.</p>';
  }

  function abrirOverlay() {
    document.getElementById('overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    document.getElementById('sheet').scrollTop = 0;
  }
  function cerrarOverlay() {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  function cerrarModal(e) { if (e.target === document.getElementById('overlay')) cerrarOverlay(); }
  function mostrarViewMode() {
    document.getElementById('view-mode').style.display = '';
    document.getElementById('edit-mode').classList.remove('visible');
  }
  function mostrarEditMode() {
    document.getElementById('view-mode').style.display = 'none';
    document.getElementById('edit-mode').classList.add('visible');
    document.getElementById('sheet').scrollTop = 0;
  }

  // ── NOTA ──
  function renderNota(nota) {
    const display = document.getElementById('nota-display');
    document.getElementById('nota-editor').style.display = 'none';
    display.style.display = '';
    if (nota) { display.className = 'nota-text'; display.textContent = nota; }
    else       { display.className = 'nota-text vacia'; display.textContent = 'Toca para agregar una nota…'; }
  }
  function editarNota() {
    const p = platillos.find(x => String(x.id) === String(idActivo));
    document.getElementById('nota-display').style.display = 'none';
    document.getElementById('nota-editor').style.display = '';
    document.getElementById('nota-input').value = p.nota || '';
    document.getElementById('nota-input').focus();
  }
  function cancelarNota() { renderNota(platillos.find(x => String(x.id) === String(idActivo))?.nota); }
  async function guardarNota() {
    const p = platillos.find(x => String(x.id) === String(idActivo));
    p.nota = document.getElementById('nota-input').value.trim();
    renderNota(p.nota);
    renderGridActual();
    try {
      await apiPost({ accion: 'editar', platillo: platilloPayload(p) });
      toast('✅ Nota guardada');
    } catch { toast('⚠️ No se pudo guardar la nota'); }
  }

  // ── EMOJI SUGERENCIAS ──
  function sugerirEmojis(texto) {
    const q = texto.toLowerCase();
    let emojis = [];
    for (const entry of EMOJI_MAP) {
      if (entry.keys.some(k => q.includes(k))) { emojis = entry.emojis; break; }
    }
    const row = document.getElementById('emoji-sugerencias');
    row.innerHTML = emojis.map(e =>
      `<span class="emoji-sugerido" onclick="elegirEmoji('${e}')">${e}</span>`
    ).join('');
  }

  function elegirEmoji(emoji) {
    document.getElementById('edit-emoji').value = emoji;
    document.querySelectorAll('.emoji-sugerido').forEach(el => {
      el.classList.toggle('seleccionado', el.textContent === emoji);
    });
  }

  // ── SECCIONES INGREDIENTES FORM ──
  function cambiarSeccion(sec, btn) {
    document.querySelectorAll('.ing-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.ing-section-form').forEach(d => d.classList.remove('visible'));
    btn.classList.add('active');
    document.getElementById('sec-' + sec).classList.add('visible');
  }

  // ── EDICIÓN ──
  function entrarEdicion() {
    modoForm = 'editar';
    document.getElementById('form-title').textContent  = 'Editar platillo';
    document.getElementById('btn-guardar').textContent = 'Guardar cambios';
    const p = platillos.find(x => String(x.id) === String(idActivo));
    document.getElementById('edit-nombre').value  = p.nombre;
    document.getElementById('edit-emoji').value   = p.emoji || '';
    document.getElementById('edit-cat').value     = p.categoria;
    document.getElementById('edit-tiempo').value  = p.tiempo;
    document.getElementById('ing-principal').value   = (p.ingredientes.principal   || []).join('\n');
    document.getElementById('ing-verduras').value    = (p.ingredientes.verduras    || []).join('\n');
    document.getElementById('ing-sazonadores').value = (p.ingredientes.sazonadores || []).join('\n');
    document.getElementById('ing-extras').value      = (p.ingredientes.extras      || []).join('\n');
    document.getElementById('edit-pasos').value   = (p.pasos || []).join('\n');
    // resetear tabs
    cambiarSeccion('principal', document.querySelector('.ing-tab'));
    sugerirEmojis(p.nombre);
    mostrarEditMode();
  }

  function cancelarEdicion() {
    if (modoForm === 'nuevo') { cerrarOverlay(); return; }
    mostrarViewMode();
  }

  function leerIngredientesForm() {
    return {
      principal:   document.getElementById('ing-principal').value.split('\n').map(s=>s.trim()).filter(Boolean),
      verduras:    document.getElementById('ing-verduras').value.split('\n').map(s=>s.trim()).filter(Boolean),
      sazonadores: document.getElementById('ing-sazonadores').value.split('\n').map(s=>s.trim()).filter(Boolean),
      extras:      document.getElementById('ing-extras').value.split('\n').map(s=>s.trim()).filter(Boolean),
    };
  }

  function platilloPayload(p) {
    return {
      ID:          p.id,
      nombre:      p.nombre,
      categoria:   p.categoria,
      tiempo:      p.tiempo,
      emoji:       p.emoji,
      ingredientes: serializarIngredientes(p.ingredientes),
      pasos:       p.pasos,
      nota:        p.nota || ''
    };
  }

  async function guardarForm() {
    const nombre = document.getElementById('edit-nombre').value.trim();
    const emoji  = document.getElementById('edit-emoji').value.trim();
    const cat    = document.getElementById('edit-cat').value;
    const tiempo = document.getElementById('edit-tiempo').value.trim();
    const ings   = leerIngredientesForm();
    const pasos  = document.getElementById('edit-pasos').value.split('\n').map(s=>s.trim()).filter(Boolean);

    if (!nombre) { toast('⚠️ El nombre es obligatorio'); return; }

    const btn = document.getElementById('btn-guardar');
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;

    if (modoForm === 'editar') {
      const p = platillos.find(x => String(x.id) === String(idActivo));
      p.nombre = nombre; p.emoji = emoji || p.emoji; p.categoria = cat;
      p.tiempo = tiempo || p.tiempo; p.ingredientes = ings; p.pasos = pasos;
      try {
        await apiPost({ accion: 'editar', platillo: platilloPayload(p) });
        toast('✅ Platillo actualizado');
        mostrarViewMode();
        poblarModal(p);
        renderGridActual();
      } catch { toast('⚠️ Error al guardar'); }
    } else {
      const nuevo = { nombre, emoji: emoji || '🍽', categoria: cat, tiempo, ingredientes: ings, pasos, nota: '' };
      try {
        const res = await apiPost({ accion: 'agregar', platillo: { ...nuevo, ingredientes: serializarIngredientes(ings) } });
        nuevo.id = res.id;
        platillos.push(nuevo);
        toast('✅ Platillo agregado');
        cerrarOverlay();
        renderGridActual();
      } catch { toast('⚠️ Error al agregar'); }
    }

    btn.innerHTML = modoForm === 'editar' ? 'Guardar cambios' : 'Agregar platillo';
    btn.disabled = false;
  }

  // ── ELIMINAR ──
  async function eliminarPlatillo() {
    const p = platillos.find(x => String(x.id) === String(idActivo));
    if (!confirm(`¿Eliminar "${p.nombre}"?`)) return;
    try {
      await apiPost({ accion: 'eliminar', platillo: { ID: p.id } });
      platillos = platillos.filter(x => String(x.id) !== String(idActivo));
      toast('🗑 Platillo eliminado');
      cerrarOverlay();
      renderGridActual();
    } catch { toast('⚠️ No se pudo eliminar'); }
  }

  // ── NUEVO ──
  function abrirNuevo() {
    modoForm = 'nuevo';
    idActivo = null;
    document.getElementById('form-title').textContent  = 'Nuevo platillo';
    document.getElementById('btn-guardar').textContent = 'Agregar platillo';
    document.getElementById('edit-nombre').value  = '';
    document.getElementById('edit-emoji').value   = '';
    document.getElementById('edit-cat').value     = 'comida';
    document.getElementById('edit-tiempo').value  = '';
    document.getElementById('ing-principal').value   = '';
    document.getElementById('ing-verduras').value    = '';
    document.getElementById('ing-sazonadores').value = '';
    document.getElementById('ing-extras').value      = '';
    document.getElementById('edit-pasos').value   = '';
    document.getElementById('emoji-sugerencias').innerHTML = '';
    document.getElementById('modal-emoji').textContent = '🍽';
    cambiarSeccion('principal', document.querySelector('.ing-tab'));
    document.getElementById('view-mode').style.display = 'none';
    document.getElementById('edit-mode').classList.add('visible');
    abrirOverlay();
  }

  // ── SORPRESA ──
  function sorprender() {
    const lista = filtroActivo === 'todos' ? platillos : platillos.filter(p => p.categoria === filtroActivo);
    if (!lista.length) return;
    abrirReceta(lista[Math.floor(Math.random() * lista.length)].id);
  }

  // ── API ──
  async function apiPost(body) {
    const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(body) });
    return res.json();
  }

  cargarPlatillos();
</script>
</body>
</html>
